version: 1
schema: prd-core
activeTemplatePack: base
supportedProductTypes:
  - consumer
  - b2b
  - agent
templateInheritance:
  - base
  - industry
  - company
  - project
  - session
workflow:
  discovery:
    steps:
      - classify
      - interview
      - synthesize
      - standards
      - validate
      - freeze
  handoff:
    target: openspec
qualityGates:
  standards:
    docsRoot: docs/basic
    command: openprd standards . --verify
  freezeRequires:
    - meta
    - problem
    - users
    - goals
    - scope
    - scenarios
    - requirements
    - constraints
    - risks
