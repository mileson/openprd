name: Publish GitHub Release

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing Git tag to publish, for example v0.1.23'
        required: true
        type: string

permissions:
  contents: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          TAG='${{ github.event.inputs.tag }}'
          if [ -z "$TAG" ]; then
            TAG='${{ github.ref_name }}'
          fi
          VERSION="${TAG#v}"
          TITLE="OpenPrd ${VERSION}"
          NOTES_FILE="$RUNNER_TEMP/openprd-github-release-notes.md"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Render release notes
        shell: bash
        run: |
          node scripts/openprd-github-release-notes.mjs . \
            --version "${{ steps.release.outputs.version }}" \
            --tag "${{ steps.release.outputs.tag }}" \
            --title "${{ steps.release.outputs.title }}" \
            --out "${{ steps.release.outputs.notes_file }}"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.release.outputs.tag }}
          VERSION: ${{ steps.release.outputs.version }}
          TITLE: ${{ steps.release.outputs.title }}
          NOTES_FILE: ${{ steps.release.outputs.notes_file }}
        shell: bash
        run: |
          FLAGS=()
          if [[ "$VERSION" == *-* ]]; then
            FLAGS+=(--prerelease)
          else
            FLAGS+=(--latest)
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              "${FLAGS[@]}"
          else
            gh release create "$TAG" \
              --title "$TITLE" \
              --notes-file "$NOTES_FILE" \
              --verify-tag \
              "${FLAGS[@]}"
          fi
